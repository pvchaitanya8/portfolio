<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>P. V. Chaitanya — Portfolio Redirect</title>
    <meta name="description"
        content="Your mission, should you choose to accept it: Visit my new portfolio website. This page will automatically redirect in 5 seconds." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://chaitanya-p-v-portfolio.vercel.app/" />

    <!-- Fallback redirect just in case JS fails -->
    <noscript>
        <meta http-equiv="refresh" content="6;url=https://chaitanya-p-v-portfolio.vercel.app/" />
    </noscript>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #030813;
            --blue: #1e90ff;
            --blue2: #64b4ff;
            --white: #f5fbff;
            --muted: rgba(245, 251, 255, .72);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 50% 20%, #0d2038 0%, #06101c 42%, var(--bg) 100%);
            color: var(--white);
            font-family: var(--sans);
        }

        body::before {
            content: "";
            position: fixed;
            inset: -30%;
            background:
                radial-gradient(circle at 24% 35%, rgba(30, 144, 255, .15), transparent 18%),
                radial-gradient(circle at 78% 72%, rgba(100, 180, 255, .12), transparent 22%);
            animation: ambient 18s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambient {
            to {
                transform: rotate(360deg);
            }
        }

        /* Ambient Grid */
        .grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: .18;
            pointer-events: none;
            background:
                linear-gradient(rgba(30, 144, 255, .15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 144, 255, .15) 1px, transparent 1px);
            background-size: 56px 56px;
            transform: perspective(800px) rotateX(66deg) scale(1.85);
            transform-origin: center bottom;
            animation: gridMove 4s linear infinite;
        }

        @keyframes gridMove {
            to {
                background-position: 0 56px, 56px 0;
            }
        }

        /* Scanning Lines */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: .12;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, .05) 0 1px, transparent 1px 4px);
            mix-blend-mode: screen;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 21;
            pointer-events: none;
            background: radial-gradient(circle, transparent 38%, rgba(0, 0, 0, .82) 100%);
        }

        /* Main Content Layout */
        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: clamp(16px, 4vw, 28px);
        }

        .mission-card {
            position: relative;
            width: min(780px, 100%);
            min-height: min(590px, 85vh);
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 1px solid rgba(100, 180, 255, .24);
            background: linear-gradient(180deg, rgba(9, 20, 37, .86), rgba(4, 10, 20, .96));
            box-shadow:
                0 34px 100px rgba(0, 0, 0, .66),
                0 0 90px rgba(30, 144, 255, .15),
                inset 0 1px 0 rgba(255, 255, 255, .09);
            clip-path: polygon(0 26px, 26px 0, 100% 0, 100% calc(100% - 26px), calc(100% - 26px) 100%, 0 100%);
        }

        .content {
            position: relative;
            z-index: 3;
            width: 100%;
            padding: clamp(24px, 5vw, 58px);
            text-align: center;
            opacity: 0;
            transform: scale(.97);
            /* Content appears after doors open */
            animation: contentIn .75s cubic-bezier(.22, 1, .36, 1) 3s forwards;
        }

        @keyframes contentIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding: 8px 14px;
            border: 1px solid rgba(100, 180, 255, .3);
            background: rgba(30, 144, 255, .1);
            color: var(--blue2);
            font-family: var(--mono);
            font-size: .78rem;
            letter-spacing: .22em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 650px;
            margin: 0 auto 18px;
            font-size: clamp(1.8rem, 6.8vw, 4.9rem);
            line-height: .98;
            letter-spacing: -.075em;
            font-weight: 900;
            text-transform: uppercase;
        }

        .accent {
            color: var(--blue2);
            text-shadow: 0 0 24px rgba(30, 144, 255, .4);
        }

        .copy {
            max-width: 620px;
            margin: 0 auto 30px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: clamp(.9rem, 2.1vw, 1.1rem);
            line-height: 1.75;
        }

        .copy strong {
            color: var(--white);
            font-weight: 700;
        }

        .count {
            width: 110px;
            height: 110px;
            margin: 0 auto 12px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            font-family: var(--mono);
            font-size: 3.8rem;
            background:
                radial-gradient(circle, rgba(30, 144, 255, .15), transparent 62%),
                repeating-radial-gradient(circle, transparent 0 20px, rgba(30, 144, 255, .1) 21px 22px);
            border: 1px solid rgba(100, 180, 255, .32);
            box-shadow: 0 0 30px rgba(30, 144, 255, .15), inset 0 0 22px rgba(30, 144, 255, .1);
            text-shadow: 0 0 20px rgba(30, 144, 255, .5);
        }

        .caption {
            margin-bottom: 26px;
            color: rgba(100, 180, 255, .78);
            font-family: var(--mono);
            font-size: .84rem;
            letter-spacing: .15em;
            text-transform: uppercase;
        }

        .progress {
            max-width: 500px;
            height: 6px;
            margin: 0 auto 26px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--blue), var(--blue2), var(--white));
            box-shadow: 0 0 22px rgba(30, 144, 255, .5);
            transform-origin: left;
        }

        body.counting .bar {
            animation: barDrain 5s linear forwards;
        }

        @keyframes barDrain {
            to {
                transform: scaleX(0);
            }
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            color: #04101a;
            background: linear-gradient(180deg, var(--white), var(--blue));
            text-decoration: none;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(30, 144, 255, .3);
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
            transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 0 40px rgba(30, 144, 255, .5);
        }

        /* 
         * ==========================================
         * COMPLETELY REBUILT DOORS SYSTEM 
         * ==========================================
         */
        .doors-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            pointer-events: none;
            overflow: hidden;
        }

        .door {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50vw;
            /* Hardcoded to half the screen mathematically */
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.02), rgba(0, 0, 0, 0.4) 48%, rgba(255, 255, 255, 0.02) 100%),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 14px),
                linear-gradient(180deg, #162438 0%, #0a121e 50%, #02050a 100%);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
        }

        .door-left {
            left: 0;
            border-right: 2px solid var(--blue2);
            animation: doorSlideLeft 2.5s cubic-bezier(0.75, 0, 0.15, 1) 0.6s forwards;
        }

        .door-right {
            right: 0;
            border-left: 2px solid var(--blue2);
            animation: doorSlideRight 2.5s cubic-bezier(0.75, 0, 0.15, 1) 0.6s forwards;
        }

        .door-seam-glow {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #fff;
            box-shadow: 0 0 20px #fff, 0 0 40px var(--blue2), 0 0 80px var(--blue);
            z-index: 10;
        }

        .door-left .door-seam-glow {
            right: -2px;
        }

        .door-right .door-seam-glow {
            left: -2px;
        }

        .door-label {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--mono);
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            letter-spacing: .3em;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 15px rgba(30, 144, 255, 0.8);
            text-transform: uppercase;
        }

        .door-left .door-label {
            right: 30px;
        }

        .door-right .door-label {
            left: 30px;
        }

        @keyframes doorSlideLeft {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        @keyframes doorSlideRight {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(100%);
            }
        }

        @media(max-width:680px) {
            .count {
                width: 92px;
                height: 92px;
                font-size: 3.1rem;
            }

            .door-label {
                font-size: 0.9rem;
                letter-spacing: 0.2em;
            }

            .door-left .door-label {
                right: 15px;
            }

            .door-right .door-label {
                left: 15px;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }

            .content {
                opacity: 1;
                transform: none;
            }

            .doors-container {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="grid"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- NEW DOORS SYSTEM -->
    <div class="doors-container" aria-hidden="true">
        <div class="door door-left">
            <div class="door-seam-glow"></div>
            <div class="door-label">Mission</div>
        </div>
        <div class="door door-right">
            <div class="door-seam-glow"></div>
            <div class="door-label">Accepted</div>
        </div>
    </div>

    <main>
        <section class="mission-card" role="main" aria-live="polite">
            <div class="content">
                <div class="label"><span class="dot"></span> Mission Brief</div>

                <h1>Your mission,<br><span class="accent">should you choose to accept it</span></h1>

                <p class="copy">
                    Visit my <strong>new portfolio website</strong>.<br>
                    This page will automatically redirect in <strong>5 seconds</strong>.
                </p>

                <div class="count" id="count">5</div>
                <div class="caption">Auto redirect</div>

                <div class="progress">
                    <div class="bar"></div>
                </div>

                <a class="button" id="cta" href="https://chaitanya-p-v-portfolio.vercel.app/">
                    Proceed to Portfolio →
                </a>
            </div>
        </section>
    </main>

    <script>
        const DEST = 'https://chaitanya-p-v-portfolio.vercel.app/';
        const DOOR_FINISH_MS = 3100; // Doors finish opening in exactly 3.1 seconds
        const COUNTDOWN_SECONDS = 5;

        const countEl = document.getElementById('count');
        const cta = document.getElementById('cta');
        let redirecting = false;

        /**
         * Dynamically generates a realistic particle-based explosion
         * with fire, drifting smoke, a shockwave, and a blinding flash.
         */
        function generateRealisticExplosion() {
            // Main container
            const container = document.createElement('div');
            container.style.cssText = 'position: fixed; inset: 0; z-index: 99999; pointer-events: none; overflow: hidden; display: flex; align-items: center; justify-content: center;';
            document.body.appendChild(container);

            // Blinding Plasma Flash
            const flash = document.createElement('div');
            flash.style.cssText = 'position: absolute; inset: 0; background: #fff; mix-blend-mode: overlay; opacity: 0; animation: explFlash 1.2s forwards;';
            container.appendChild(flash);

            // Expanding Shockwave
            const shock = document.createElement('div');
            shock.style.cssText = 'position: absolute; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 40px var(--blue), inset 0 0 40px var(--blue2); opacity: 0; animation: explShock 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;';
            container.appendChild(shock);

            // Generate Fire and Smoke Particles
            for (let i = 0; i < 50; i++) {
                const isSmoke = i > 20; // First 20 are fire, rest are smoke
                const p = document.createElement('div');

                // Randomize sizes, distances, and angles
                const size = isSmoke ? 15 + Math.random() * 30 : 5 + Math.random() * 20; // vmin
                const angle = Math.random() * Math.PI * 2;
                const distance = isSmoke ? 20 + Math.random() * 40 : 10 + Math.random() * 60; // vmin

                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - (isSmoke ? 30 : 0); // Smoke naturally drifts upwards

                p.style.cssText = `
                    position: absolute;
                    width: ${size}vmin; height: ${size}vmin;
                    border-radius: 50%;
                    background: ${isSmoke ? '#111' : 'radial-gradient(circle, #fff 0%, #ff9800 40%, transparent 80%)'};
                    filter: ${isSmoke ? 'blur(15px)' : 'blur(2px)'};
                    mix-blend-mode: ${isSmoke ? 'normal' : 'screen'};
                    opacity: ${isSmoke ? 0.9 : 1};
                    transform: scale(0.1);
                    animation: particleAnim${isSmoke ? 'Smoke' : 'Fire'} ${isSmoke ? 2 + Math.random() * 1.5 : 0.8 + Math.random() * 0.5}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
                `;

                // Inject destination coordinates as CSS variables for the animation
                p.style.setProperty('--tx', `${tx}vmin`);
                p.style.setProperty('--ty', `${ty}vmin`);

                container.appendChild(p);
            }

            // Inject the @keyframes dynamically
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes explFlash { 
                    0% { opacity: 1; background: #fff; } 
                    15% { opacity: 0.9; background: var(--blue2); } 
                    100% { opacity: 0; background: #000; } 
                }
                @keyframes explShock { 
                    0% { width: 0; height: 0; opacity: 1; border-width: 15px; } 
                    100% { width: 150vmax; height: 150vmax; opacity: 0; border-width: 1px; } 
                }
                @keyframes particleAnimFire { 
                    0% { transform: translate(0, 0) scale(0.1); opacity: 1; } 
                    100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; } 
                }
                @keyframes particleAnimSmoke { 
                    0% { transform: translate(0, 0) scale(0.1); opacity: 0.9; } 
                    100% { transform: translate(var(--tx), var(--ty)) scale(3.5); opacity: 0; } 
                }
            `;
            document.head.appendChild(style);
        }

        function triggerExplosion() {
            if (redirecting) return;
            redirecting = true;

            // Fire the smoke/fire particle generator
            generateRealisticExplosion();

            // Wait 1.3 seconds so the user can actually see the smoke expanding before redirecting
            setTimeout(() => {
                window.location.href = DEST;
            }, 1300);
        }

        function beginCountdown() {
            document.body.classList.add('counting');

            let remaining = COUNTDOWN_SECONDS;
            countEl.textContent = remaining;

            const timer = setInterval(() => {
                remaining -= 1;
                countEl.textContent = Math.max(remaining, 0);

                countEl.animate([
                    { transform: 'scale(1.22)', filter: 'brightness(1.9)' },
                    { transform: 'scale(1)', filter: 'brightness(1)' }
                ], { duration: 280, easing: 'cubic-bezier(.2,.8,.2,1)' });

                if (remaining <= 0) {
                    clearInterval(timer);
                    triggerExplosion();
                }
            }, 1000);

            cta.addEventListener('click', event => {
                event.preventDefault();
                clearInterval(timer);
                triggerExplosion();
            }, { once: true });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Start the countdown exactly as the doors finish parting
            setTimeout(beginCountdown, DOOR_FINISH_MS);
        });
    </script>
</body>

</html>

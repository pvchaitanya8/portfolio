<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>P. V. Chaitanya — Portfolio Redirect</title>
    <meta name="description"
        content="Your mission, should you choose to accept it: Visit my new portfolio website. This page will automatically redirect in 5 seconds." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://chaitanya-p-v-portfolio.vercel.app/" />
    <meta http-equiv="refresh" content="11;url=https://chaitanya-p-v-portfolio.vercel.app/" />

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #030813;
            --blue: #68d4ff;
            --blue2: #bcefff;
            --white: #f5fbff;
            --muted: rgba(245, 251, 255, .72);
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 20%, #10243d 0%, #071425 42%, var(--bg) 100%);
            color: var(--white);
            font-family: var(--sans);
        }

        body::before {
            content: "";
            position: fixed;
            inset: -30%;
            background:
                radial-gradient(circle at 24% 35%, rgba(104, 212, 255, .15), transparent 18%),
                radial-gradient(circle at 78% 72%, rgba(188, 239, 255, .12), transparent 22%);
            animation: ambient 18s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambient {
            to {
                transform: rotate(360deg)
            }
        }

        .grid {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: .18;
            pointer-events: none;
            background:
                linear-gradient(rgba(104, 212, 255, .12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(104, 212, 255, .12) 1px, transparent 1px);
            background-size: 56px 56px;
            transform: perspective(800px) rotateX(66deg) scale(1.85);
            transform-origin: center bottom;
            animation: gridMove 4s linear infinite;
        }

        @keyframes gridMove {
            to {
                background-position: 0 56px, 56px 0
            }
        }

        .mission-lines {
            position: fixed;
            inset: 0;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .line {
            position: absolute;
            left: -95vw;
            width: 84vw;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(104, 212, 255, .15), rgba(255, 255, 255, .9), rgba(104, 212, 255, .35), transparent);
            box-shadow: 0 0 16px rgba(104, 212, 255, .48), 0 0 36px rgba(104, 212, 255, .18);
            transform: rotate(-18deg);
            animation: missionLine 5.4s cubic-bezier(.2, .85, .15, 1) infinite;
        }

        .line:nth-child(1) {
            top: 14%;
            animation-delay: .1s
        }

        .line:nth-child(2) {
            top: 34%;
            animation-delay: 1.2s;
            transform: rotate(18deg);
            opacity: .65
        }

        .line:nth-child(3) {
            top: 58%;
            animation-delay: 2.2s
        }

        .line:nth-child(4) {
            top: 80%;
            animation-delay: 3.25s;
            transform: rotate(18deg);
            opacity: .7
        }

        @keyframes missionLine {
            0% {
                translate: 0 0;
                opacity: 0
            }

            12%,
            76% {
                opacity: 1
            }

            100% {
                translate: 195vw 0;
                opacity: 0
            }
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            opacity: .12;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, .05) 0 1px, transparent 1px 4px);
            mix-blend-mode: screen;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 21;
            pointer-events: none;
            background: radial-gradient(circle, transparent 38%, rgba(0, 0, 0, .82) 100%);
        }

        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .mission-card {
            position: relative;
            width: min(780px, 92vw);
            min-height: 590px;
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 1px solid rgba(188, 239, 255, .24);
            background:
                linear-gradient(180deg, rgba(9, 20, 37, .86), rgba(4, 10, 20, .96));
            box-shadow:
                0 34px 100px rgba(0, 0, 0, .66),
                0 0 90px rgba(104, 212, 255, .13),
                inset 0 1px 0 rgba(255, 255, 255, .09);
            clip-path: polygon(0 26px, 26px 0, 100% 0, 100% calc(100% - 26px), calc(100% - 26px) 100%, 0 100%);
        }

        .mission-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 0 42%, rgba(255, 255, 255, .08) 49%, transparent 56% 100%);
            transform: translateX(-130%);
            animation: sheen 3s ease-in-out 6s infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes sheen {

            55%,
            100% {
                transform: translateX(130%)
            }
        }

        .content {
            position: relative;
            z-index: 3;
            width: 100%;
            padding: clamp(30px, 5vw, 58px);
            text-align: center;
            opacity: 0;
            transform: scale(.97);
            animation: contentIn .75s cubic-bezier(.22, 1, .36, 1) 3.8s forwards;
        }

        @keyframes contentIn {
            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding: 8px 14px;
            border: 1px solid rgba(188, 239, 255, .3);
            background: rgba(104, 212, 255, .08);
            color: var(--blue2);
            font-family: var(--mono);
            font-size: .78rem;
            letter-spacing: .22em;
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 16px rgba(104, 212, 255, .95);
            animation: pulse 1.1s ease-in-out infinite;
        }

        @keyframes pulse {
            50% {
                transform: scale(.55);
                opacity: .35
            }
        }

        h1 {
            max-width: 650px;
            margin: 0 auto 18px;
            font-size: clamp(2rem, 6.8vw, 4.9rem);
            line-height: .98;
            letter-spacing: -.075em;
            font-weight: 900;
            text-transform: uppercase;
        }

        .accent {
            color: var(--blue2);
            text-shadow: 0 0 24px rgba(104, 212, 255, .35);
        }

        .copy {
            max-width: 620px;
            margin: 0 auto 30px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: clamp(.95rem, 2.1vw, 1.1rem);
            line-height: 1.75;
        }

        .copy strong {
            color: var(--white);
            font-weight: 700
        }

        .count {
            width: 110px;
            height: 110px;
            margin: 0 auto 12px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            font-family: var(--mono);
            font-size: 3.8rem;
            background:
                radial-gradient(circle, rgba(104, 212, 255, .12), transparent 62%),
                repeating-radial-gradient(circle, transparent 0 20px, rgba(104, 212, 255, .14) 21px 22px);
            border: 1px solid rgba(188, 239, 255, .32);
            box-shadow: 0 0 30px rgba(104, 212, 255, .14), inset 0 0 22px rgba(104, 212, 255, .09);
            text-shadow: 0 0 20px rgba(104, 212, 255, .42);
        }

        .caption {
            margin-bottom: 26px;
            color: rgba(188, 239, 255, .78);
            font-family: var(--mono);
            font-size: .84rem;
            letter-spacing: .15em;
            text-transform: uppercase;
        }

        .progress {
            max-width: 500px;
            height: 6px;
            margin: 0 auto 26px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1);
            overflow: hidden;
        }

        .bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--blue), var(--blue2), var(--white));
            box-shadow: 0 0 22px rgba(104, 212, 255, .4);
            transform-origin: left;
        }

        body.counting .bar {
            animation: barDrain 5s linear forwards
        }

        @keyframes barDrain {
            to {
                transform: scaleX(0)
            }
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            color: #04101a;
            background: linear-gradient(180deg, var(--white), var(--blue));
            text-decoration: none;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(104, 212, 255, .25);
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
            transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 0 40px rgba(104, 212, 255, .45);
        }

        /* DOORS ARE INSIDE THE CARD AND STAY VISIBLE AT THE SIDES */
        .doors {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            overflow: hidden;
            background: #02050c;
            animation: doorsBackgroundGone .35s ease 3.8s forwards;
        }

        @keyframes doorsBackgroundGone {
            to {
                background: transparent
            }
        }

        .door {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50.2%;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, .20), rgba(255, 255, 255, .04) 10%, rgba(0, 0, 0, .45) 48%, rgba(255, 255, 255, .12) 100%),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, .14) 0 1px, transparent 1px 14px),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, .045) 0 2px, transparent 2px 32px),
                linear-gradient(180deg, #4b5768 0%, #1b283b 38%, #060c16 100%);
            box-shadow:
                inset 0 0 90px rgba(255, 255, 255, .13),
                inset 0 0 180px rgba(0, 0, 0, .84),
                0 0 90px rgba(0, 0, 0, .9);
            animation-duration: 3.25s;
            animation-timing-function: cubic-bezier(.72, 0, .12, 1);
            animation-fill-mode: forwards;
            animation-delay: .35s;
        }

        .door::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(115deg, transparent 0 34%, rgba(255, 255, 255, .22) 45%, transparent 56% 100%),
                radial-gradient(circle at 50% 50%, rgba(104, 212, 255, .17), transparent 34%);
            opacity: .95;
        }

        .door::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(180deg, transparent, var(--blue2), var(--white), var(--blue2), transparent);
            box-shadow: 0 0 22px var(--white), 0 0 62px var(--blue), 0 0 120px rgba(104, 212, 255, .55);
        }

        .door.left {
            left: 0;
            animation-name: leftDoorOpen;
        }

        .door.right {
            right: 0;
            animation-name: rightDoorOpen;
        }

        .door.left::after {
            right: -3px
        }

        .door.right::after {
            left: -3px
        }

        .door-label {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-family: var(--mono);
            font-size: clamp(.9rem, 2vw, 1.2rem);
            letter-spacing: .24em;
            color: rgba(245, 251, 255, .78);
            text-transform: uppercase;
            text-shadow: 0 0 18px rgba(104, 212, 255, .55);
            white-space: nowrap;
            z-index: 2;
        }

        .door.left .door-label {
            right: 36px
        }

        .door.right .door-label {
            left: 36px
        }

        .seam {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 8px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, transparent, var(--white), var(--blue), var(--white), transparent);
            box-shadow: 0 0 28px var(--white), 0 0 90px var(--blue), 0 0 180px rgba(104, 212, 255, .65);
            animation: seamOpen 3.25s cubic-bezier(.22, 1, .36, 1) .35s forwards;
        }

        .door-light {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, .92) 0 4%, rgba(104, 212, 255, .36) 13%, transparent 46%);
            opacity: 0;
            animation: doorLight 3.25s cubic-bezier(.22, 1, .36, 1) .35s forwards;
        }

        @keyframes leftDoorOpen {
            0% {
                transform: translateX(0)
            }

            24% {
                transform: translateX(0)
            }

            100% {
                transform: translateX(-82%)
            }
        }

        @keyframes rightDoorOpen {
            0% {
                transform: translateX(0)
            }

            24% {
                transform: translateX(0)
            }

            100% {
                transform: translateX(82%)
            }
        }

        @keyframes seamOpen {
            0% {
                width: 5px;
                opacity: .8
            }

            24% {
                width: 10px;
                opacity: 1
            }

            70% {
                width: 24%;
                opacity: .75
            }

            100% {
                width: 120%;
                opacity: 0
            }
        }

        @keyframes doorLight {
            0% {
                opacity: 0;
                transform: scale(.8)
            }

            30% {
                opacity: .85;
                transform: scale(1)
            }

            100% {
                opacity: 0;
                transform: scale(1.35)
            }
        }

        .explosion {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 1) 0 5%, rgba(188, 239, 255, .95) 9%, rgba(104, 212, 255, .55) 18%, rgba(104, 212, 255, .16) 31%, transparent 54%);
            mix-blend-mode: screen;
        }

        .explosion.active {
            animation: explodeFlash .72s cubic-bezier(.2, .8, .2, 1) forwards
        }

        .explosion.active::before,
        .explosion.active::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(245, 251, 255, .84);
            box-shadow:
                0 0 28px rgba(255, 255, 255, .9),
                0 0 70px rgba(104, 212, 255, .72),
                0 0 130px rgba(104, 212, 255, .36);
        }

        .explosion.active::before {
            animation: shockwave .72s ease-out forwards
        }

        .explosion.active::after {
            animation: shockwave .72s ease-out .12s forwards
        }

        @keyframes explodeFlash {
            0% {
                opacity: 0;
                transform: scale(.65);
                filter: brightness(1)
            }

            14% {
                opacity: 1;
                transform: scale(1);
                filter: brightness(2.1)
            }

            42% {
                opacity: .9;
                transform: scale(1.08);
                filter: brightness(1.65)
            }

            100% {
                opacity: 0;
                transform: scale(1.22);
                filter: brightness(1)
            }
        }

        @keyframes shockwave {
            0% {
                width: 18px;
                height: 18px;
                opacity: 1
            }

            100% {
                width: 160vmax;
                height: 160vmax;
                opacity: 0
            }
        }

        @media(max-width:680px) {
            main {
                padding: 18px
            }

            .mission-card {
                min-height: 620px
            }

            .content {
                padding: 28px 18px
            }

            h1 {
                font-size: clamp(1.85rem, 10vw, 3.55rem)
            }

            .copy {
                font-size: .92rem
            }

            .count {
                width: 92px;
                height: 92px;
                font-size: 3.1rem
            }

            .line {
                width: 92vw
            }

            .door-label {
                font-size: .72rem;
                letter-spacing: .15em
            }

            .door.left .door-label {
                right: 18px
            }

            .door.right .door-label {
                left: 18px
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }

            .content {
                opacity: 1;
                transform: none
            }

            .doors {
                display: none
            }
        }
    </style>
</head>

<body>
    <div class="grid"></div>

    <div class="mission-lines">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <main>
        <section class="mission-card" role="main" aria-live="polite">
            <div class="content">
                <div class="label"><span class="dot"></span> Mission Brief</div>

                <h1>Your mission,<br><span class="accent">should you choose to accept it</span></h1>

                <p class="copy">
                    Visit my <strong>new portfolio website</strong>.<br>
                    This page will automatically redirect in <strong>5 seconds</strong>.
                </p>

                <div class="count" id="count">5</div>
                <div class="caption">Auto redirect</div>

                <div class="progress">
                    <div class="bar"></div>
                </div>

                <a class="button" id="cta" href="https://chaitanya-p-v-portfolio.vercel.app/">
                    Proceed to Portfolio →
                </a>
            </div>

            <div class="doors" aria-hidden="true">
                <div class="door-light"></div>
                <div class="door left">
                    <div class="door-label">Mission</div>
                </div>
                <div class="door right">
                    <div class="door-label">Accepted</div>
                </div>
                <div class="seam"></div>
            </div>
        </section>
    </main>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="explosion" id="explosion"></div>

    <script>
        const DEST = 'https://chaitanya-p-v-portfolio.vercel.app/';
        const DOOR_FINISH_MS = 3900;
        const COUNTDOWN_SECONDS = 5;

        const countEl = document.getElementById('count');
        const cta = document.getElementById('cta');

        let redirecting = false;

        let audioCtx = null;
        let audioUnlocked = false;

        function getAudioContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            if (!audioCtx) audioCtx = new AudioContextClass();
            return audioCtx;
        }

        function unlockAudio() {
            const ctx = getAudioContext();
            if (!ctx || audioUnlocked) return;

            if (ctx.state === 'suspended') {
                ctx.resume().catch(() => { });
            }

            // Silent micro-tone primes audio on browsers that require a user gesture.
            const gain = ctx.createGain();
            const osc = ctx.createOscillator();
            gain.gain.value = 0.0001;
            osc.frequency.value = 220;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.03);
            audioUnlocked = true;
        }

        function playElectricExplosion() {
            const ctx = getAudioContext();
            if (!ctx) return;

            if (ctx.state === 'suspended') {
                ctx.resume().catch(() => { });
            }

            const now = ctx.currentTime;
            const master = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            const compressor = ctx.createDynamicsCompressor();

            master.gain.setValueAtTime(0.0001, now);
            master.gain.exponentialRampToValueAtTime(0.22, now + 0.025);
            master.gain.exponentialRampToValueAtTime(0.035, now + 0.38);
            master.gain.exponentialRampToValueAtTime(0.0001, now + 0.82);

            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(950, now);
            filter.frequency.exponentialRampToValueAtTime(2600, now + 0.08);
            filter.frequency.exponentialRampToValueAtTime(420, now + 0.62);
            filter.Q.value = 1.2;

            compressor.threshold.value = -22;
            compressor.knee.value = 18;
            compressor.ratio.value = 4;
            compressor.attack.value = 0.004;
            compressor.release.value = 0.18;

            filter.connect(master);
            master.connect(compressor);
            compressor.connect(ctx.destination);

            // Soft electric crackle noise burst.
            const duration = 0.82;
            const bufferSize = Math.floor(ctx.sampleRate * duration);
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                const t = i / bufferSize;
                const decay = Math.pow(1 - t, 2.6);
                const crackle = Math.random() > 0.82 ? Math.random() * 2 - 1 : (Math.random() * 2 - 1) * 0.25;
                data[i] = crackle * decay;
            }

            const noise = ctx.createBufferSource();
            noise.buffer = buffer;

            const noiseGain = ctx.createGain();
            noiseGain.gain.setValueAtTime(0.0001, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.72);

            noise.connect(noiseGain);
            noiseGain.connect(filter);
            noise.start(now);
            noise.stop(now + duration);

            // Low polished thump, kept subtle.
            const thump = ctx.createOscillator();
            const thumpGain = ctx.createGain();
            thump.type = 'sine';
            thump.frequency.setValueAtTime(92, now);
            thump.frequency.exponentialRampToValueAtTime(34, now + 0.45);
            thumpGain.gain.setValueAtTime(0.0001, now);
            thumpGain.gain.exponentialRampToValueAtTime(0.16, now + 0.018);
            thumpGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
            thump.connect(thumpGain);
            thumpGain.connect(master);
            thump.start(now);
            thump.stop(now + 0.6);

            // Bright electric zap accent.
            [1180, 1840, 2550].forEach((freq, index) => {
                const zap = ctx.createOscillator();
                const zapGain = ctx.createGain();

                zap.type = index === 1 ? 'triangle' : 'sawtooth';
                zap.frequency.setValueAtTime(freq, now + index * 0.018);
                zap.frequency.exponentialRampToValueAtTime(freq * 0.42, now + 0.24 + index * 0.018);

                zapGain.gain.setValueAtTime(0.0001, now + index * 0.018);
                zapGain.gain.exponentialRampToValueAtTime(0.035, now + 0.035 + index * 0.018);
                zapGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28 + index * 0.018);

                zap.connect(zapGain);
                zapGain.connect(master);
                zap.start(now + index * 0.018);
                zap.stop(now + 0.32 + index * 0.018);
            });
        }

        function triggerExplosion() {
            if (redirecting) return;
            redirecting = true;

            document.getElementById('explosion').classList.add('active');
            playElectricExplosion();

            setTimeout(() => {
                window.location.href = DEST;
            }, 860);
        }

        function beginCountdown() {
            document.body.classList.add('counting');

            let remaining = COUNTDOWN_SECONDS;
            countEl.textContent = remaining;

            const timer = setInterval(() => {
                remaining -= 1;
                countEl.textContent = Math.max(remaining, 0);

                countEl.animate([
                    { transform: 'scale(1.22)', filter: 'brightness(1.9)' },
                    { transform: 'scale(1)', filter: 'brightness(1)' }
                ], { duration: 280, easing: 'cubic-bezier(.2,.8,.2,1)' });

                if (remaining <= 0) {
                    clearInterval(timer);
                    triggerExplosion();
                }
            }, 1000);

            cta.addEventListener('click', event => {
                event.preventDefault();
                clearInterval(timer);
                window.location.href = DEST;
            }, { once: true });
        }

        ['pointerdown', 'keydown', 'touchstart', 'click'].forEach(eventName => {
            window.addEventListener(eventName, unlockAudio, { once: true, passive: true });
        });

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(beginCountdown, DOOR_FINISH_MS);
        });
    </script>
</body>

</html>
